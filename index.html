<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Moon Hero</title>

  <!-- Tailwind CSS (Play CDN - desarrollo) -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

 <style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #020617;
  }

  canvas {
    display: block;
  }

  #game-container {
    width: 100%;
    height: 100%;
  }

  #game-container canvas {
    display: block;
    width: 100% !important;
    height: 100% !important;
  }
</style>
</head>
<body class="min-h-screen bg-slate-950 text-white">
  <div class="relative min-h-screen overflow-hidden">
    <!-- Fondo decorativo -->
    <div class="absolute inset-0 bg-gradient-to-br from-slate-950 via-slate-900 to-indigo-950"></div>
    <div class="absolute -top-32 -left-20 h-96 w-96 rounded-full bg-cyan-500/10 blur-3xl"></div>
    <div class="absolute bottom-0 right-0 h-[28rem] w-[28rem] rounded-full bg-fuchsia-500/10 blur-3xl"></div>

    <!-- Layout -->
    <div class="relative z-10 flex min-h-screen flex-col">
      <!-- Header -->
      <header class="flex items-center justify-between px-8 py-5 lg:px-12">
        <div>
          <h1 class="text-3xl font-black tracking-widest text-white lg:text-4xl">
            MOON HERO
          </h1>
          <p class="mt-1 text-sm text-slate-300 lg:text-base">
            Prototype rhythm game en Phaser
          </p>
        </div>

        <div class="hidden rounded-2xl border border-white/10 bg-white/5 px-4 py-3 backdrop-blur md:block">
          <p class="text-xs font-semibold uppercase tracking-[0.25em] text-cyan-300">
            Controles
          </p>
          <p class="mt-1 text-sm text-slate-200">
            A · S · D · F
          </p>
        </div>
      </header>

      <!-- Main -->
      <main class="flex flex-1 items-center justify-center px-4 pb-6 pt-2 lg:px-8">
        <div class="grid w-full max-w-[1850px] grid-cols-1 gap-6 xl:grid-cols-[320px_minmax(0,1fr)]">
          <!-- Panel lateral -->
          <aside class="rounded-3xl border border-white/10 bg-white/5 p-6 shadow-2xl backdrop-blur-xl">
            <div class="mb-6">
              <p class="text-xs font-bold uppercase tracking-[0.3em] text-cyan-300">
                Proyecto
              </p>
              <h2 class="mt-2 text-2xl font-extrabold text-white">
                Phaser Music
              </h2>
              <p class="mt-3 text-sm leading-6 text-slate-300">
                Menú, selección de niveles, video de fondo y gameplay rítmico con notas.
              </p>
            </div>

            <div class="space-y-4">
              <div class="rounded-2xl border border-white/10 bg-slate-900/50 p-4">
                <p class="text-xs font-semibold uppercase tracking-[0.25em] text-slate-400">
                  Niveles
                </p>
                <p class="mt-2 text-base font-semibold text-white">
                  Promise / Miku / Electric Angel
                </p>
              </div>

              <div class="rounded-2xl border border-white/10 bg-slate-900/50 p-4">
                <p class="text-xs font-semibold uppercase tracking-[0.25em] text-slate-400">
                  Resolución
                </p>
                <p class="mt-2 text-base font-semibold text-white">
                  1920 × 1080
                </p>
              </div>

              <div class="rounded-2xl border border-white/10 bg-slate-900/50 p-4">
                <p class="text-xs font-semibold uppercase tracking-[0.25em] text-slate-400">
                  Estado
                </p>
                <p class="mt-2 text-base font-semibold text-emerald-300">
                  Prototipo jugable
                </p>
              </div>
            </div>
          </aside>

          <!-- Contenedor del juego -->
          <section class="flex items-center justify-center">
            <div class="w-full rounded-[2rem] border border-white/10 bg-black/30 p-3 shadow-[0_0_80px_rgba(0,0,0,0.45)] backdrop-blur-xl">
              <div class="overflow-hidden rounded-[1.5rem] border border-white/10 bg-black">
               <div class="relative w-full max-w-[1400px] aspect-[16/9] max-h-[80vh] mx-auto">
                  <div id="game-container" class="absolute inset-0"></div>
                </div>
              </div>
            </div>
          </section>
        </div>
      </main>
    </div>
  </div>

  <script src="./phaser.js"></script>
  <script type="module" src="./main.js"></script>
</body>
</html>
